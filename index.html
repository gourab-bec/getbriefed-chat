<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gourab Basu — AI Career Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* ── Registration ── */
  #reg-screen { width: 100%; max-width: 440px; padding: 24px; }
  .card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 36px 32px; }
  .avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #1a1a2e, #16213e); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: #fff; margin: 0 auto 16px; letter-spacing: -1px; }
  .card h1 { text-align: center; font-size: 20px; font-weight: 700; color: #1a1a2e; }
  .card .sub { text-align: center; font-size: 13px; color: #6b7280; margin: 6px 0 28px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .field input { width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 14px; color: #1a1a2e; outline: none; transition: border 0.2s; }
  .field input:focus { border-color: #1a1a2e; }
  .btn-start { width: 100%; padding: 12px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
  .btn-start:hover { opacity: 0.85; }
  .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }
  .privacy { text-align: center; font-size: 11px; color: #9ca3af; margin-top: 16px; }

  /* ── Chat ── */
  #chat-screen { display: none; width: 100%; max-width: 720px; height: 100vh; flex-direction: column; }
  .chat-header { background: #1a1a2e; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
  .chat-header .av { width: 38px; height: 38px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #1a1a2e; flex-shrink: 0; }
  .chat-header .info h2 { font-size: 15px; font-weight: 700; color: #fff; }
  .chat-header .info p { font-size: 11px; color: #94a3b8; margin-top: 1px; }
  .chat-header .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; color: #4ade80; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .budget-bar { background: #16213e; padding: 6px 20px; }
  .budget-track { background: #0f3460; border-radius: 4px; height: 4px; overflow: hidden; }
  .budget-fill { height: 100%; background: #4ade80; border-radius: 4px; transition: width 0.5s; }
  .budget-label { font-size: 10px; color: #64748b; margin-top: 4px; text-align: right; }

  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background: #f0f2f5; }
  .msg { display: flex; gap: 10px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg .bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.55; }
  .msg.bot .bubble { background: #fff; color: #1a1a2e; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .msg.user .bubble { background: #1a1a2e; color: #fff; border-bottom-right-radius: 4px; }
  .msg .av-sm { width: 32px; height: 32px; border-radius: 50%; background: #1a1a2e; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; margin-top: 2px; }
  .msg.user .av-sm { background: #6b7280; }

  .typing { display: flex; gap: 4px; padding: 14px 16px; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  .input-area { background: #fff; padding: 14px 16px; display: flex; gap: 10px; align-items: flex-end; border-top: 1px solid #e5e7eb; }
  #msg-input { flex: 1; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 10px 14px; font-size: 14px; resize: none; outline: none; max-height: 120px; font-family: inherit; line-height: 1.4; }
  #msg-input:focus { border-color: #1a1a2e; }
  .send-btn { width: 40px; height: 40px; border-radius: 10px; background: #1a1a2e; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: #fff; }

  .blocked-banner { background: #fef3c7; border: 1px solid #f59e0b; border-radius: 10px; padding: 14px 16px; font-size: 13px; color: #92400e; text-align: center; margin: 0 20px; }
  .extend-btn { background: #f59e0b; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 8px; }

  @media(max-width:600px) { .msg { max-width: 95%; } }
</style>
</head>
<body>

<!-- REGISTRATION -->
<div id="reg-screen">
  <div class="card">
    <div class="avatar">GB</div>
    <h1>Meet Gourab Basu</h1>
    <p class="sub">Enterprise Sales Executive · AI Practitioner · 23 years at Accenture, IBM & Cognizant</p>
    <div class="field"><label>Your Name</label><input id="r-name" type="text" placeholder="Jane Smith" /></div>
    <div class="field"><label>Work Email</label><input id="r-email" type="email" placeholder="jane@company.com" /></div>
    <div class="field"><label>Company</label><input id="r-company" type="text" placeholder="Acme Corp" /></div>
    <div class="field"><label>Role You're Hiring For <span style="font-weight:400;text-transform:none">(optional)</span></label><input id="r-role" type="text" placeholder="VP Sales, Partner Manager..." /></div>
    <button class="btn-start" id="start-btn" onclick="startSession()">Start Conversation →</button>
    <p class="privacy">Your information is kept private and used only to personalise this session.</p>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <div class="chat-header">
    <div class="av">GB</div>
    <div class="info">
      <h2>Gourab Basu</h2>
      <p id="header-sub">Enterprise Sales · AI Practitioner</p>
    </div>
    <div class="status"><div class="status-dot"></div>Available</div>
  </div>
  <div class="budget-bar">
    <div class="budget-track"><div class="budget-fill" id="budget-fill" style="width:100%"></div></div>
    <div class="budget-label" id="budget-label">Session active</div>
  </div>
  <div class="messages" id="messages"></div>
  <div id="blocked-area"></div>
  <div class="input-area">
    <textarea id="msg-input" rows="1" placeholder="Ask anything about Gourab's experience…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const API = "https://agent-gourab-api.onrender.com";
let sessionId, interviewerId, companyId, messages = [], blocked = false, budgetPct = 100;

async function startSession() {
  const name = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const company = document.getElementById('r-company').value.trim();
  const role = document.getElementById('r-role').value.trim();
  if (!name || !email || !email.includes('@')) { alert('Please enter your name and a valid work email.'); return; }

  const btn = document.getElementById('start-btn');
  btn.disabled = true; btn.textContent = 'Connecting…';

  try {
    const res = await fetch(`${API}/register`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, email, company, roleContext: role })
    });
    const d = await res.json();
    sessionId = d.session_id; interviewerId = d.interviewer_id; companyId = d.company_id;

    document.getElementById('reg-screen').style.display = 'none';
    const cs = document.getElementById('chat-screen');
    cs.style.display = 'flex';
    document.getElementById('header-sub').textContent = role ? `Discussing: ${role}` : 'Enterprise Sales · AI Practitioner';

    const greeting = d.returning
      ? `Welcome back! I remember you from a previous session. What would you like to explore today?`
      : `Hi ${name}! I'm Gourab's AI career assistant. Ask me anything about his background, achievements, or approach — I'll give you straight answers. What would you like to know?`;
    addMessage('bot', greeting);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Start Conversation →';
    alert('Connection error. Please try again.');
  }
}

function addMessage(role, text) {
  const el = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = 'av-sm';
  av.textContent = role === 'bot' ? 'GB' : '👤';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>');
  wrap.appendChild(av); wrap.appendChild(bubble);
  el.appendChild(wrap);
  el.scrollTop = el.scrollHeight;
  if (role === 'user') messages.push({role:'user', content: text});
  if (role === 'bot') messages.push({role:'assistant', content: text});
}

function showTyping() {
  const el = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot'; wrap.id = 'typing-indicator';
  wrap.innerHTML = '<div class="av-sm">GB</div><div class="bubble typing"><span></span><span></span><span></span></div>';
  el.appendChild(wrap); el.scrollTop = el.scrollHeight;
}
function hideTyping() { const t = document.getElementById('typing-indicator'); if(t) t.remove(); }

async function sendMessage() {
  if (blocked) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; autoResize(input);
  document.getElementById('send-btn').disabled = true;

  addMessage('user', text);
  showTyping();

  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        messages, sessionId, interviewerId, companyId,
        interviewerName: document.getElementById('r-name').value.trim(),
        interviewerCompany: document.getElementById('r-company').value.trim(),
        roleContext: document.getElementById('r-role').value.trim()
      })
    });

    if (res.status === 402) {
      hideTyping();
      showBlocked(); return;
    }

    // Stream the response
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    hideTyping();

    const el = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    const av = document.createElement('div'); av.className = 'av-sm'; av.textContent = 'GB';
    const bubble = document.createElement('div'); bubble.className = 'bubble';
    wrap.appendChild(av); wrap.appendChild(bubble);
    el.appendChild(wrap);

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const d = JSON.parse(line.slice(6));
            if (d.text) { fullText += d.text; bubble.innerHTML = fullText.replace(/\n/g,'<br>'); el.scrollTop = el.scrollHeight; }
            if (d.budget_pct !== undefined) updateBudget(d.budget_pct);
            if (d.warn) showWarn();
            if (d.blocked) { showBlocked(); break; }
          } catch(e) {}
        }
      }
    }
    messages.push({role:'assistant', content: fullText});
  } catch(e) {
    hideTyping();
    addMessage('bot', 'I had trouble connecting. Please try again.');
  }
  document.getElementById('send-btn').disabled = false;
}

function updateBudget(pct) {
  budgetPct = pct * 100;
  document.getElementById('budget-fill').style.width = budgetPct + '%';
  document.getElementById('budget-fill').style.background = budgetPct < 25 ? '#f59e0b' : '#4ade80';
  document.getElementById('budget-label').textContent = `Session: ${Math.round(budgetPct)}% remaining`;
}

function showWarn() {
  document.getElementById('budget-label').textContent = '⚠ Session nearly complete — Gourab has been notified';
}

function showBlocked() {
  blocked = true;
  document.getElementById('msg-input').disabled = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('blocked-area').innerHTML = `
    <div class="blocked-banner">
      <strong>Session limit reached.</strong><br>
      Gourab has been notified and can extend your session.<br>
      <button class="extend-btn" onclick="requestExtension()">Request Extension</button>
    </div>`;
}

async function requestExtension() {
  await fetch(`${API}/end-session`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      sessionId, interviewerId, companyId,
      interviewerName: document.getElementById('r-name').value.trim(),
      interviewerEmail: document.getElementById('r-email').value.trim(),
      interviewerCompany: document.getElementById('r-company').value.trim(),
      roleContext: document.getElementById('r-role').value.trim(),
      extensionRequest: true
    })
  });
  document.getElementById('blocked-area').innerHTML = `
    <div class="blocked-banner" style="background:#d1fae5;border-color:#10b981;color:#065f46">
      ✅ Extension requested. Gourab will approve shortly — please wait.
    </div>`;
  pollForExtension();
}

async function pollForExtension() {
  const check = async () => {
    try {
      const r = await fetch(`${API}/session-state/${sessionId}`);
      const d = await r.json();
      if (!d.budget_exhausted) {
        blocked = false;
        document.getElementById('blocked-area').innerHTML = '';
        document.getElementById('msg-input').disabled = false;
        document.getElementById('send-btn').disabled = false;
        addMessage('bot', 'Your session has been extended. Please continue!');
        updateBudget(1);
        return;
      }
    } catch(e) {}
    setTimeout(check, 5000);
  };
  setTimeout(check, 5000);
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
</script>
</body>
</html>
